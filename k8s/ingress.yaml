# k8s-whodis/k8s/ingress.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-whodis
  namespace: k8s-whodis
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # traefik.ingress.kubernetes.io/router.middlewares: k8s-whodis-strip-whodis-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /    #whodis
            pathType: Prefix
            backend:
              service:
                name: k8s-whodis
                port:
                  number: 5000
          # - path: /hostname
          #   pathType: Exact
          #   backend:
          #     service:
          #       name: k8s-whodis
          #       port:
          #         number: 5000

# http://0.0.0.0:5000