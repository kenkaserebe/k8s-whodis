# k8s-whodis/k8s/ingress.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-whodis
  namespace: k8s-whodis
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /whodis
            pathType: Prefix
            backend:
              service:
                name: k8s-whodis
                port:
                  number: 80
          - path: /hostname
            pathType: Exact
            backend:
              service:
                name: k8s-whodis
                port:
                  number: 80

# http://<ip-address>/whodis