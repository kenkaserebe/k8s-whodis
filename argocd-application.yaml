# k8s-whodis/argocd-application.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-whodis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kenkaserebe/k8s-whodis
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-whodis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
  revisionHistoryLimit: 5